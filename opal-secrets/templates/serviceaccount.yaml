{{- $root := . }}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "opal-secrets.fullname" . }}
  labels:
    {{- include "opal-secrets.labels" $root | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opal-secrets.fullname" . }}
  labels:
    {{- include "opal-secrets.labels" $root | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opal-secrets.fullname" . }}
  labels:
    {{- include "opal-secrets.labels" $root | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opal-secrets.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "opal-secrets.fullname" . }}
